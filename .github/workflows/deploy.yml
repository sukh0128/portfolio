name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Or replace with the branch you use

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.16.0'  # Replace with your node version if different

    - name: Install dependencies
      run: npm install  # Or yarn install if you're using Yarn

    - name: Build project
      run: npm run build  # Replace with your build command

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist  # Replace with the directory where your static files are generated
